<!DOCTYPE html>
<html lang="ja">
<head meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>都道府県マスター</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#eef7ff;
}
#prefImage{
    width:400px;
    margin:20px;
}
button{
    margin:5px;
    padding:8px 15px;
}

/* ★結果を大きく */
#result{
    font-size:40px;
    font-weight:bold;
    margin-top:20px;
}

/* ★次へボタン */
#nextBtn{
    display:none;
    font-size:18px;
    padding:10px 20px;
}

#retryBtn{
    display:none;
}
</style>
</head>
<body>

<h1>都道府県マスター</h1>

<button onclick="setMode('name')">都道府県名モード</button>
<button onclick="setMode('capital')">県庁所在地モード</button>

<h2 id="modeDisplay"></h2>
<h2 id="questionNumber"></h2>

<img id="prefImage" src="">

<br>
<input type="text" id="answer" placeholder="答えを入力">
<button onclick="checkAnswer()">回答</button>

<!-- ★追加 -->
<button id="nextBtn" onclick="next()">➡ 次の問題</button>

<p id="result"></p>
<p id="score"></p>

<button id="retryBtn" onclick="start()">🔁 もう一度挑戦</button>

<script>

const prefectures = [
{ name:"北海道", kana:"ほっかいどう", capital:"札幌市", capitalKana:"さっぽろし"},
{ name:"青森県", kana:"あおもりけん", capital:"青森市", capitalKana:"あおもりし"},
{ name:"岩手県", kana:"いわてけん", capital:"盛岡市", capitalKana:"もりおかし"},
{ name:"宮城県", kana:"みやぎけん", capital:"仙台市", capitalKana:"せんだいし"},
{ name:"秋田県", kana:"あきたけん", capital:"秋田市", capitalKana:"あきたし"},
{ name:"山形県", kana:"やまがたけん", capital:"山形市", capitalKana:"やまがたし"},
{ name:"福島県", kana:"ふくしまけん", capital:"福島市", capitalKana:"ふくしまし"},
{ name:"茨城県", kana:"いばらきけん", capital:"水戸市", capitalKana:"みとし"},
{ name:"栃木県", kana:"とちぎけん", capital:"宇都宮市", capitalKana:"うつのみやし"},
{ name:"群馬県", kana:"ぐんまけん", capital:"前橋市", capitalKana:"まえばしし"},
{ name:"埼玉県", kana:"さいたまけん", capital:"さいたま市", capitalKana:"さいたまし"},
{ name:"千葉県", kana:"ちばけん", capital:"千葉市", capitalKana:"ちばし"},
{ name:"東京都", kana:"とうきょうと", capital:"新宿区", capitalKana:"しんじゅくく"},
{ name:"神奈川県", kana:"かながわけん", capital:"横浜市", capitalKana:"よこはまし"},
{ name:"新潟県", kana:"にいがたけん", capital:"新潟市", capitalKana:"にいがたし"},
{ name:"富山県", kana:"とやまけん", capital:"富山市", capitalKana:"とやまし"},
{ name:"石川県", kana:"いしかわけん", capital:"金沢市", capitalKana:"かなざわし"},
{ name:"福井県", kana:"ふくいけん", capital:"福井市", capitalKana:"ふくいし"},
{ name:"山梨県", kana:"やまなしけん", capital:"甲府市", capitalKana:"こうふし"},
{ name:"長野県", kana:"ながのけん", capital:"長野市", capitalKana:"ながのし"},
{ name:"岐阜県", kana:"ぎふけん", capital:"岐阜市", capitalKana:"ぎふし"},
{ name:"静岡県", kana:"しずおかけん", capital:"静岡市", capitalKana:"しずおかし"},
{ name:"愛知県", kana:"あいちけん", capital:"名古屋市", capitalKana:"なごやし"},
{ name:"三重県", kana:"みえけん", capital:"津市", capitalKana:"つし"},
{ name:"滋賀県", kana:"しがけん", capital:"大津市", capitalKana:"おおつし"},
{ name:"京都府", kana:"きょうとふ", capital:"京都市", capitalKana:"きょうとし"},
{ name:"大阪府", kana:"おおさかふ", capital:"大阪市", capitalKana:"おおさかし"},
{ name:"兵庫県", kana:"ひょうごけん", capital:"神戸市", capitalKana:"こうべし"},
{ name:"奈良県", kana:"ならけん", capital:"奈良市", capitalKana:"ならし"},
{ name:"和歌山県", kana:"わかやまけん", capital:"和歌山市", capitalKana:"わかやまし"},
{ name:"鳥取県", kana:"とっとりけん", capital:"鳥取市", capitalKana:"とっとりし"},
{ name:"島根県", kana:"しまねけん", capital:"松江市", capitalKana:"まつえし"},
{ name:"岡山県", kana:"おかやまけん", capital:"岡山市", capitalKana:"おかやまし"},
{ name:"広島県", kana:"ひろしまけん", capital:"広島市", capitalKana:"ひろしまし"},
{ name:"山口県", kana:"やまぐちけん", capital:"山口市", capitalKana:"やまぐちし"},
{ name:"徳島県", kana:"とくしまけん", capital:"徳島市", capitalKana:"とくしまし"},
{ name:"香川県", kana:"かがわけん", capital:"高松市", capitalKana:"たかまつし"},
{ name:"愛媛県", kana:"えひめけん", capital:"松山市", capitalKana:"まつやまし"},
{ name:"高知県", kana:"こうちけん", capital:"高知市", capitalKana:"こうちし"},
{ name:"福岡県", kana:"ふくおかけん", capital:"福岡市", capitalKana:"ふくおかし"},
{ name:"佐賀県", kana:"さがけん", capital:"佐賀市", capitalKana:"さがし"},
{ name:"長崎県", kana:"ながさきけん", capital:"長崎市", capitalKana:"ながさきし"},
{ name:"熊本県", kana:"くまもとけん", capital:"熊本市", capitalKana:"くまもとし"},
{ name:"大分県", kana:"おおいたけん", capital:"大分市", capitalKana:"おおいたし"},
{ name:"宮崎県", kana:"みやざきけん", capital:"宮崎市", capitalKana:"みやざきし"},
{ name:"鹿児島県", kana:"かごしまけん", capital:"鹿児島市", capitalKana:"かごしまし"},
{ name:"沖縄県", kana:"おきなわけん", capital:"那覇市", capitalKana:"なはし"}
];

let quiz=[], current=0, score=0, mode="name";

function setMode(m){
mode=m;
document.getElementById("modeDisplay").innerText=
mode==="name"?"都道府県名モード":"県庁所在地モード";
start();
}

function start(){
quiz=[...prefectures].sort(()=>0.5-Math.random()).slice(0,10);
current=0;
score=0;
document.getElementById("retryBtn").style.display="none";
document.getElementById("score").innerText="";
next();
}

function next(){

// 次へボタンを隠す
document.getElementById("nextBtn").style.display="none";

if(current>=quiz.length){
document.getElementById("questionNumber").innerText="終了！";
document.getElementById("score").innerText="スコア："+score+"/10";
document.getElementById("retryBtn").style.display="inline-block";
return;
}

document.getElementById("questionNumber").innerText="第"+(current+1)+"問";

if(mode==="name"){
    document.getElementById("prefImage").src =
    "images/name/"+quiz[current].name+".png";
}else{
    document.getElementById("prefImage").src =
    "images/capital/"+quiz[current].name+".png";
}

document.getElementById("answer").value="";
document.getElementById("result").innerText="";

// 次の問題へ進める準備
current++;
}

function checkAnswer(){
let input=document.getElementById("answer").value.trim();
let correct=false;
let q = quiz[current-1];

if(mode==="name"){
correct=(input===q.name||input===q.kana);
}else{
correct=(
input===q.capital||
input===q.capitalKana||
 (q.name === "東京都" &&
     (input === "東京" || input === "とうきょう"))
);
}

if(correct){
score++;
document.getElementById("result").innerText="⭕ 正解！";
}else{
let ans;

if(mode==="name"){
    ans = q.name;
}else{
    if(q.name === "東京都"){
        ans = "東京(新宿区)";
    }else{
        ans = q.capital;
    }
}

document.getElementById("result").innerText="❌ 正解は "+ans;
}

// 次へボタン表示
document.getElementById("nextBtn").style.display="inline-block";
}

setMode("name");

</script>
</body>
</html>
